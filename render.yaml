services:
  - type: web
    name: fly577-blog-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webapp.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://token.sensenova.cn/v1
      - key: LLM_MODEL
        value: sensenova-6.7-flash-lite
      - key: TAVILY_API_KEY
        sync: false
      - key: CORS_ALLOW_ORIGINS
        value: https://fly577.github.io,https://fly577.github.io/blog
