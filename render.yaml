services:
  - type: web
    name: fly-dream
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webapp.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://token.sensenova.cn/v1
      - key: LLM_MODEL
        value: sensenova-6.7-flash-lite
      - key: TAVILY_API_KEY
        sync: false
      - key: CORS_ALLOW_ORIGINS
        value: http://127.0.0.1:8000,http://localhost:8000,https://fly-dream.onrender.com
